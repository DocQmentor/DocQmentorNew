  <rect x="800" y="554" width="78" height="18" rx="8" fill="#e6f7ed"/>
  <text x="839" y="567" text-anchor="middle" fill="#1e6e3a" font-size="10" font-weight="700">✔ Reviewed</text>
  <text x="940" y="570" fill="#4a6080" font-size="12">2 days ago</text>
  <text x="1080" y="570" fill="#4a6080" font-size="12">16/03/2026</text>
  <rect x="1184" y="556" width="42" height="22" rx="5" fill="#256695"/>
  <text x="1205" y="571" text-anchor="middle" fill="white" font-size="11" font-weight="700">View</text>

  <!-- Pagination -->
