  <text x="585" y="851" text-anchor="middle" fill="white" font-size="12" font-weight="700">1</text>
  <rect x="608" y="835" width="30" height="22" rx="4" fill="white" stroke="#d0dae4" stroke-width="1.5"/>
  <text x="623" y="851" text-anchor="middle" fill="#256695" font-size="12" font-weight="700">2</text>
  <rect x="646" y="835" width="30" height="22" rx="4" fill="white" stroke="#d0dae4" stroke-width="1.5"/>
  <text x="661" y="851" text-anchor="middle" fill="#256695" font-size="12" font-weight="700">3</text>
  <rect x="684" y="835" width="30" height="22" rx="4" fill="white" stroke="#d0dae4" stroke-width="1.5"/>
  <text x="699" y="851" text-anchor="middle" fill="#256695" font-size="12">›</text>

  <!-- ═══════════════════════════════════════════════
       DESIGN LABEL
  ═══════════════════════════════════════════════ -->
  <rect x="40" y="876" width="540" height="20" rx="4" fill="#256695" opacity="0.08"/>
  <text x="310" y="890" text-anchor="middle" fill="#256695" font-size="11" font-weight="700">Design 01 — New Dashboard: Direct Upload with Auto-Detection &amp; Multi-Model Tabs</text>

</svg>
