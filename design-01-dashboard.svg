  <text x="1130" y="331" fill="#aaa" font-size="11">🔍 Search…</text>
  <line x1="390" y1="350" x2="1240" y2="350" stroke="#f0f3f7" stroke-width="1"/>

  <!-- Table header -->
  <rect x="390" y="351" width="850" height="34" fill="#256695"/>
  <text x="415" y="373" fill="white" font-size="11.5" font-weight="700">ID</text>
  <text x="460" y="373" fill="white" font-size="11.5" font-weight="700">Document Name</text>
  <text x="680" y="373" fill="white" font-size="11.5" font-weight="700">Type</text>
  <text x="800" y="373" fill="white" font-size="11.5" font-weight="700">Status</text>
  <text x="940" y="373" fill="white" font-size="11.5" font-weight="700">Uploaded</text>
  <text x="1080" y="373" fill="white" font-size="11.5" font-weight="700">Date</text>
  <text x="1185" y="373" fill="white" font-size="11.5" font-weight="700">Action</text>

  <!-- Row 1 -->
  <rect x="390" y="385" width="850" height="40" fill="white"/>
  <text x="415" y="410" fill="#2a3f55" font-size="12">#1041</text>
  <text x="460" y="410" fill="#2a3f55" font-size="12">TechCorp_Invoice_2024.pdf</text>
  <rect x="680" y="395" width="80" height="18" rx="6" fill="#e8f1fb"/>
  <text x="720" y="408" text-anchor="middle" fill="#256695" font-size="10" font-weight="700">💲 Invoice</text>
  <rect x="800" y="395" width="90" height="18" rx="8" fill="#e6f7ed"/>
  <text x="845" y="408" text-anchor="middle" fill="#2e9a55" font-size="10" font-weight="700">✅ Completed</text>
  <text x="940" y="410" fill="#4a6080" font-size="12">2 hours ago</text>
  <text x="1080" y="410" fill="#4a6080" font-size="12">18/03/2026</text>
  <rect x="1184" y="396" width="42" height="22" rx="5" fill="#256695"/>
  <text x="1205" y="411" text-anchor="middle" fill="white" font-size="11" font-weight="700">View</text>
  <line x1="390" y1="425" x2="1240" y2="425" stroke="#f0f3f7" stroke-width="1"/>

  <!-- Row 2 (even) -->
  <rect x="390" y="425" width="850" height="40" fill="#f9fbfd"/>
  <text x="415" y="450" fill="#2a3f55" font-size="12">#1040</text>
  <text x="460" y="450" fill="#2a3f55" font-size="12">HSBC_BankStatement_Feb.pdf</text>
  <rect x="680" y="434" width="110" height="18" rx="6" fill="#e6f7ed"/>
  <text x="735" y="447" text-anchor="middle" fill="#2e7a44" font-size="10" font-weight="700">🏦 Bank Statement</text>
  <rect x="800" y="434" width="110" height="18" rx="8" fill="#ffeaea"/>
  <text x="855" y="447" text-anchor="middle" fill="#ec2225" font-size="10" font-weight="700">⚠️ Manual Review</text>
  <text x="940" y="450" fill="#4a6080" font-size="12">5 hours ago</text>
  <text x="1080" y="450" fill="#4a6080" font-size="12">18/03/2026</text>
  <rect x="1184" y="436" width="42" height="22" rx="5" fill="#256695"/>
  <text x="1205" y="451" text-anchor="middle" fill="white" font-size="11" font-weight="700">View</text>
  <line x1="390" y1="465" x2="1240" y2="465" stroke="#f0f3f7" stroke-width="1"/>

  <!-- Row 3 -->
  <rect x="390" y="465" width="850" height="40" fill="white"/>
  <text x="415" y="490" fill="#2a3f55" font-size="12">#1039</text>
  <text x="460" y="490" fill="#2a3f55" font-size="12">LoanDoc_MortgageApp.pdf</text>
  <rect x="680" y="474" width="106" height="18" rx="6" fill="#fff3e0"/>
  <text x="733" y="487" text-anchor="middle" fill="#b36a00" font-size="10" font-weight="700">🏠 Mortgage Forms</text>
  <rect x="800" y="474" width="90" height="18" rx="8" fill="#e6f7ed"/>
  <text x="845" y="487" text-anchor="middle" fill="#2e9a55" font-size="10" font-weight="700">✅ Completed</text>
  <text x="940" y="490" fill="#4a6080" font-size="12">Yesterday</text>
  <text x="1080" y="490" fill="#4a6080" font-size="12">17/03/2026</text>
  <rect x="1184" y="476" width="42" height="22" rx="5" fill="#256695"/>
  <text x="1205" y="491" text-anchor="middle" fill="white" font-size="11" font-weight="700">View</text>
  <line x1="390" y1="505" x2="1240" y2="505" stroke="#f0f3f7" stroke-width="1"/>

  <!-- Row 4 (even) -->
  <rect x="390" y="505" width="850" height="40" fill="#f9fbfd"/>
  <text x="415" y="530" fill="#2a3f55" font-size="12">#1038</text>
  <text x="460" y="530" fill="#2a3f55" font-size="12">AlphaCo_Invoice_Q1.pdf</text>
  <rect x="680" y="514" width="80" height="18" rx="6" fill="#e8f1fb"/>
  <text x="720" y="527" text-anchor="middle" fill="#256695" font-size="10" font-weight="700">💲 Invoice</text>
  <rect x="800" y="514" width="88" height="18" rx="8" fill="#fff7e0"/>
  <text x="844" y="527" text-anchor="middle" fill="#c08000" font-size="10" font-weight="700">⏳ In Process</text>
  <text x="940" y="530" fill="#4a6080" font-size="12">Yesterday</text>
  <text x="1080" y="530" fill="#4a6080" font-size="12">17/03/2026</text>
  <rect x="1184" y="516" width="42" height="22" rx="5" fill="#256695"/>
  <text x="1205" y="531" text-anchor="middle" fill="white" font-size="11" font-weight="700">View</text>
  <line x1="390" y1="545" x2="1240" y2="545" stroke="#f0f3f7" stroke-width="1"/>

  <!-- Row 5 -->
  <rect x="390" y="545" width="850" height="40" fill="white"/>
  <text x="415" y="570" fill="#2a3f55" font-size="12">#1037</text>
  <text x="460" y="570" fill="#2a3f55" font-size="12">Barclays_Statement_Q4.pdf</text>
