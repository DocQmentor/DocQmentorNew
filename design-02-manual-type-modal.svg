<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 900" font-family="Segoe UI, Arial, sans-serif">

  <defs>
    <filter id="card-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#00000012"/>
    </filter>
    <filter id="modal-shadow">
      <feDropShadow dx="0" dy="10" stdDeviation="28" flood-color="#00000035"/>
    </filter>
  </defs>

  <!-- ─── Background (blurred dashboard behind modal) ─── -->
  <rect width="1280" height="900" fill="#f4f7fa"/>

  <!-- Header -->
  <rect x="0" y="0" width="1280" height="60" fill="#ffffff" opacity="0.6"/>
  <rect x="24" y="14" width="34" height="34" rx="8" fill="#256695" opacity="0.5"/>
  <text x="41" y="36" text-anchor="middle" fill="white" font-size="13" font-weight="700" opacity="0.5">DQ</text>
  <text x="68" y="36" fill="#256695" font-size="17" font-weight="800" opacity="0.5">DocQmentor</text>

  <!-- Blurred dashboard elements behind -->
  <rect x="40" y="80" width="280" height="70" rx="12" fill="white" opacity="0.4"/>
  <rect x="340" y="80" width="280" height="70" rx="12" fill="white" opacity="0.4"/>
  <rect x="640" y="80" width="280" height="70" rx="12" fill="white" opacity="0.4"/>
  <rect x="940" y="80" width="300" height="70" rx="12" fill="white" opacity="0.4"/>
  <rect x="40" y="170" width="430" height="32" rx="9" fill="white" opacity="0.4"/>
  <rect x="40" y="220" width="310" height="530" rx="12" fill="white" opacity="0.4"/>
  <rect x="370" y="220" width="870" height="530" rx="12" fill="white" opacity="0.4"/>

  <!-- ─── Modal Overlay ─── -->
  <rect width="1280" height="900" fill="rgba(15,25,40,0.52)"/>

  <!-- ─── Modal Box ─── -->
  <rect x="390" y="130" width="500" height="640" rx="20" fill="white" filter="url(#modal-shadow)"/>

  <!-- Modal top accent bar -->
  <rect x="390" y="130" width="500" height="6" rx="3" fill="#256695"/>

  <!-- Close button -->
  <circle cx="870" cy="158" r="14" fill="#f4f7fa"/>
  <text x="870" y="163" text-anchor="middle" fill="#6a82a0" font-size="14" font-weight="700">✕</text>

  <!-- Icon -->
  <circle cx="640" cy="218" r="42" fill="#f0f7ff"/>
  <text x="640" y="232" text-anchor="middle" font-size="38">🤔</text>

  <!-- Title -->
  <text x="640" y="286" text-anchor="middle" fill="#1a2a3a" font-size="20" font-weight="800">Document Type Not Detected</text>

  <!-- Subtitle -->
  <text x="640" y="312" text-anchor="middle" fill="#7a90aa" font-size="13">We couldn't identify the type for this file.</text>
  <text x="640" y="330" text-anchor="middle" fill="#7a90aa" font-size="13">Please select the correct document model to continue.</text>

  <!-- Filename box -->
  <rect x="430" y="348" width="420" height="38" rx="9" fill="#f4f8fb" stroke="#d4e2ef" stroke-width="1.5"/>
  <text x="640" y="372" text-anchor="middle" fill="#256695" font-size="13" font-weight="700">📄 Document_Scan_003.pdf</text>

  <!-- Section label -->
  <text x="640" y="412" text-anchor="middle" fill="#8a9bb0" font-size="11" font-weight="700">SELECT DOCUMENT TYPE</text>

  <!-- ─── Type Option Cards ─── -->

  <!-- Invoice Card (selected) -->
  <rect x="422" y="424" width="138" height="130" rx="12" fill="#e8f1fb" stroke="#256695" stroke-width="2.5"/>
  <text x="491" y="468" text-anchor="middle" font-size="34">💲</text>
  <text x="491" y="498" text-anchor="middle" fill="#256695" font-size="13" font-weight="800">Invoice</text>
  <text x="491" y="515" text-anchor="middle" fill="#5a7a9a" font-size="10">Vendor invoices,</text>
  <text x="491" y="529" text-anchor="middle" fill="#5a7a9a" font-size="10">receipts, bills</text>
  <!-- Selected check -->
  <circle cx="550" cy="435" r="10" fill="#256695"/>
  <text x="550" y="440" text-anchor="middle" fill="white" font-size="11" font-weight="700">✓</text>

  <!-- Bank Statement Card -->
  <rect x="571" y="424" width="138" height="130" rx="12" fill="white" stroke="#e0e8f0" stroke-width="1.5"/>
  <text x="640" y="468" text-anchor="middle" font-size="34">🏦</text>
  <text x="640" y="498" text-anchor="middle" fill="#256695" font-size="13" font-weight="800">Bank Statement</text>
  <text x="640" y="515" text-anchor="middle" fill="#7a90aa" font-size="10">Account &amp; balance</text>
  <text x="640" y="529" text-anchor="middle" fill="#7a90aa" font-size="10">statements</text>

  <!-- Mortgage Card -->
  <rect x="720" y="424" width="138" height="130" rx="12" fill="white" stroke="#e0e8f0" stroke-width="1.5"/>
  <text x="789" y="468" text-anchor="middle" font-size="34">🏠</text>
  <text x="789" y="498" text-anchor="middle" fill="#256695" font-size="13" font-weight="800">Mortgage Forms</text>
  <text x="789" y="515" text-anchor="middle" fill="#7a90aa" font-size="10">Loan &amp; mortgage</text>
  <text x="789" y="529" text-anchor="middle" fill="#7a90aa" font-size="10">documents</text>

  <!-- ─── Action Buttons ─── -->
  <!-- Cancel -->
  <rect x="422" y="580" width="190" height="42" rx="10" fill="white" stroke="#d0dae4" stroke-width="1.5"/>
  <text x="517" y="606" text-anchor="middle" fill="#6a82a0" font-size="13" font-weight="700">Cancel</text>

  <!-- Confirm -->
  <rect x="626" y="580" width="232" height="42" rx="10" fill="#256695"/>
  <text x="742" y="606" text-anchor="middle" fill="white" font-size="13" font-weight="700">✅ Confirm &amp; Add to Queue</text>

  <!-- ─── Helper text ─── -->
  <rect x="422" y="640" width="438" height="36" rx="8" fill="#f0f7ff"/>
  <text x="641" y="657" text-anchor="middle" fill="#5a7a9a" font-size="11">💡 This dialog appears automatically when a file's type cannot</text>
  <text x="641" y="672" text-anchor="middle" fill="#5a7a9a" font-size="11">be determined from the filename.</text>

  <!-- ─── Annotation arrows ─── -->
  <!-- Arrow pointing to selected card -->
  <line x1="350" y1="489" x2="420" y2="489" stroke="#256695" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <rect x="200" y="472" width="148" height="34" rx="8" fill="#256695"/>
  <text x="274" y="488" text-anchor="middle" fill="white" font-size="11" font-weight="700">Auto-highlighted</text>
  <text x="274" y="502" text-anchor="middle" fill="white" font-size="11">if close match found</text>

  <!-- Arrow pointing to confirm button -->
  <line x1="930" y1="601" x2="860" y2="601" stroke="#ec2225" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <rect x="930" y="585" width="168" height="34" rx="8" fill="#ec2225"/>
  <text x="1014" y="601" text-anchor="middle" fill="white" font-size="11" font-weight="700">Disabled until a type</text>
  <text x="1014" y="615" text-anchor="middle" fill="white" font-size="11">is selected</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#256695"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="0" refY="3" orient="auto">
      <path d="M8,0 L8,6 L0,3 z" fill="#ec2225"/>
    </marker>
  </defs>

  <!-- ─── Design label ─── -->
  <rect x="370" y="855" width="540" height="22" rx="4" fill="#256695" opacity="0.1"/>
  <text x="640" y="870" text-anchor="middle" fill="#256695" font-size="11" font-weight="700">Design 02 — Manual Type Selection Modal (shown when file type cannot be auto-detected)</text>

</svg>
