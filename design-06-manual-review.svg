  <text x="60" y="874" fill="#6a82a0" font-size="11">Confidence score below threshold  ·  One or more mandatory fields missing  ·  Flagged for review by AI</text>

  <!-- Design label -->
  <rect x="340" y="872" width="600" height="20" rx="4" fill="#ec2225" opacity="0.08"/>
  <text x="640" y="886" text-anchor="middle" fill="#ec2225" font-size="11" font-weight="700">Design 06 — Manual Review Queue (Edit button opens Edit Modal; per-model tabs with pending counts)</text>
