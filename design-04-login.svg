<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 820" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="s1"><feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#00000014"/></filter>
    <filter id="s2"><feDropShadow dx="0" dy="6" stdDeviation="18" flood-color="#00000022"/></filter>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d3c61"/>
      <stop offset="100%" stop-color="#256695"/>
    </linearGradient>
    <linearGradient id="card-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f7fbff"/>
    </linearGradient>
  </defs>

  <!-- Split background -->
  <rect width="1280" height="820" fill="url(#bg)"/>
  <rect x="620" y="0" width="660" height="820" fill="#f4f7fa"/>

  <!-- Decorative circles on left -->
  <circle cx="80" cy="120" r="180" fill="rgba(255,255,255,0.04)"/>
  <circle cx="520" cy="700" r="220" fill="rgba(255,255,255,0.04)"/>
  <circle cx="380" cy="400" r="260" fill="rgba(255,255,255,0.03)"/>

  <!-- ─── LEFT PANEL: Branding ─── -->
  <!-- Logo area -->
  <rect x="60" y="52" width="40" height="40" rx="10" fill="white" opacity="0.15"/>
  <text x="80" y="77" text-anchor="middle" fill="white" font-size="16" font-weight="800">DQ</text>
  <text x="112" y="77" fill="white" font-size="20" font-weight="800">DocQmentor</text>
  <text x="112" y="96" fill="rgba(255,255,255,0.6)" font-size="11">Powered by Techstar</text>

  <!-- Main heading -->
  <text x="60" y="200" fill="white" font-size="36" font-weight="800">Welcome to</text>
  <text x="60" y="248">
    <tspan fill="#7dd3f8" font-size="38" font-weight="800">D</tspan><tspan fill="#f87171" font-size="38" font-weight="800">Q</tspan><tspan fill="white" font-size="38" font-weight="800">mentor</tspan>
  </text>
  <text x="60" y="296" fill="rgba(255,255,255,0.75)" font-size="15">Automate &amp; Empower your Team's Productivity</text>

  <!-- Feature cards on left -->
  <!-- Card 1 -->
  <rect x="60" y="340" width="240" height="90" rx="12" fill="rgba(255,255,255,0.08)"/>
  <rect x="76" y="356" width="36" height="36" rx="8" fill="rgba(255,255,255,0.15)"/>
  <text x="94" y="379" text-anchor="middle" font-size="18">🏠</text>
  <text x="124" y="374" fill="white" font-size="13" font-weight="700">Dashboard</text>
  <text x="124" y="392" fill="rgba(255,255,255,0.65)" font-size="11">Document management</text>
  <text x="124" y="407" fill="rgba(255,255,255,0.65)" font-size="11">command center</text>

  <!-- Card 2 -->
  <rect x="318" y="340" width="240" height="90" rx="12" fill="rgba(255,255,255,0.08)"/>
  <rect x="334" y="356" width="36" height="36" rx="8" fill="rgba(255,255,255,0.15)"/>
  <text x="352" y="379" text-anchor="middle" font-size="18">📤</text>
  <text x="382" y="374" fill="white" font-size="13" font-weight="700">Upload</text>
  <text x="382" y="392" fill="rgba(255,255,255,0.65)" font-size="11">Drag-and-drop with</text>
  <text x="382" y="407" fill="rgba(255,255,255,0.65)" font-size="11">batch processing</text>

  <!-- Card 3 -->
  <rect x="60" y="448" width="240" height="90" rx="12" fill="rgba(255,255,255,0.08)"/>
  <rect x="76" y="464" width="36" height="36" rx="8" fill="rgba(255,255,255,0.15)"/>
  <text x="94" y="487" text-anchor="middle" font-size="18">📊</text>
  <text x="124" y="482" fill="white" font-size="13" font-weight="700">Status Tracker</text>
  <text x="124" y="500" fill="rgba(255,255,255,0.65)" font-size="11">Real-time stage</text>
  <text x="124" y="515" fill="rgba(255,255,255,0.65)" font-size="11">tracking</text>

  <!-- Card 4 -->
  <rect x="318" y="448" width="240" height="90" rx="12" fill="rgba(255,255,255,0.08)"/>
  <rect x="334" y="464" width="36" height="36" rx="8" fill="rgba(255,255,255,0.15)"/>
  <text x="352" y="487" text-anchor="middle" font-size="18">📋</text>
  <text x="382" y="482" fill="white" font-size="13" font-weight="700">Data View</text>
  <text x="382" y="500" fill="rgba(255,255,255,0.65)" font-size="11">Filterable table</text>
  <text x="382" y="515" fill="rgba(255,255,255,0.65)" font-size="11">with bulk actions</text>

  <!-- Bottom logos -->
  <text x="60" y="760" fill="rgba(255,255,255,0.4)" font-size="11">© 2026 DocQmentor · Techstar Technologies</text>

  <!-- ─── RIGHT PANEL: Login card ─── -->
  <rect x="680" y="160" width="480" height="480" rx="20" fill="url(#card-grad)" filter="url(#s2)"/>

  <!-- Card top accent -->
  <rect x="680" y="160" width="480" height="6" rx="3" fill="#ec2225"/>

  <!-- Card content -->
  <text x="920" y="238" text-anchor="middle" fill="#256695" font-size="22" font-weight="800">Sign in to DocQmentor</text>
  <text x="920" y="262" text-anchor="middle" fill="#8a9bb0" font-size="13">Use your Microsoft organisational account</text>

  <!-- Divider -->
  <line x1="720" y1="282" x2="1120" y2="282" stroke="#eef0f3" stroke-width="1"/>

  <!-- Microsoft logo area -->
  <rect x="780" y="310" width="280" height="140" rx="14" fill="#f7fbff" stroke="#e0e8f0" stroke-width="1.5"/>
  <text x="920" y="358" text-anchor="middle" font-size="36">⊞</text>
  <text x="920" y="390" text-anchor="middle" fill="#2a3f55" font-size="14" font-weight="700">Microsoft Azure AD</text>
  <text x="920" y="412" text-anchor="middle" fill="#8a9bb0" font-size="12">Enterprise authentication</text>
  <text x="920" y="432" text-anchor="middle" fill="#8a9bb0" font-size="12">with MFA support</text>

  <!-- Login button -->
  <rect x="740" y="470" width="360" height="52" rx="12" fill="#256695" filter="url(#s1)"/>
  <text x="920" y="501" text-anchor="middle" fill="white" font-size="15" font-weight="800">⊞  Login with Microsoft</text>

  <!-- Note -->
  <text x="920" y="544" text-anchor="middle" fill="#8a9bb0" font-size="11">Secure single sign-on via Microsoft MSAL</text>
  <text x="920" y="560" text-anchor="middle" fill="#8a9bb0" font-size="11">Only authorised organisational accounts are permitted</text>

  <!-- Footer note -->
  <text x="920" y="610" text-anchor="middle" fill="#aab8c8" font-size="11">🔒 Your session is protected by Azure Active Directory</text>

  <!-- Design label -->
  <rect x="390" y="792" width="500" height="20" rx="4" fill="#256695" opacity="0.08"/>
  <text x="640" y="806" text-anchor="middle" fill="#256695" font-size="11" font-weight="700">Design 04 — Login Screen (Split-panel with Microsoft SSO)</text>
</svg>
